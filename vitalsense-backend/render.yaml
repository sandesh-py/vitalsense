services:
  - type: web
    name: vitalsense-backend
    env: python
    rootDir: vitalsense-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FRONTEND_URL
        value: http://localhost:5173 # Update this to Vercel URL later via Render Dashboard
